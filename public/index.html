  <!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>کافه برگ | منو</title>
<!-- فونت گوگل حذف شد چون بدون فیلترشکن لود نمی‌شد؛ از فونت‌های خود سیستم استفاده می‌کنیم -->
<style>
  :root{
    --bg:#111411;
    --bg-soft:#171b16;
    --card:#1c211b;
    --card-border:#2a3126;
    --fg:#f3f1e9;
    --fg-dim:#a9ad9f;
    --green:#5f8f5a;
    --green-bright:#7fb377;
    --green-deep:#2e4a2c;
    --line: rgba(127,179,119,0.25);
    --radius: 4px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse 900px 500px at 15% -5%, rgba(95,143,90,0.14), transparent 60%),
      radial-gradient(ellipse 700px 500px at 100% 10%, rgba(95,143,90,0.08), transparent 60%),
      var(--bg);
    color:var(--fg);
    font-family: Tahoma, 'Segoe UI', 'Vazirmatn', Arial, sans-serif;
    min-height:100vh;
    line-height:1.7;
    position:relative;
  }
  a{color:inherit;}

  .bg-leaves{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:0;
    pointer-events:none;
    opacity:0.5;
  }
  .content{
    position:relative;
    z-index:1;
  }

  .vein{
    width:100%;
    height:22px;
    display:block;
    opacity:0.55;
  }
  .vein svg{width:100%;height:100%;display:block;}

  header.top{
    padding:56px 20px 28px;
    text-align:center;
    position:relative;
  }
  .leaf-mark{
    width:46px;height:46px;margin:0 auto 14px;
    color:var(--green-bright);
  }
  header.top h1{
    font-size:2.4rem;
    font-weight:800;
    letter-spacing:0.5px;
    margin:0 0 8px;
    color:var(--fg);
  }
  header.top .tagline{
    color:var(--fg-dim);
    font-size:0.98rem;
    font-weight:300;
    letter-spacing:0.3px;
  }

  nav.tabs{
    display:flex;
    justify-content:center;
    gap:6px;
    flex-wrap:wrap;
    padding:0 16px 34px;
    max-width:900px;
    margin:0 auto;
  }
  nav.tabs button{
    background:transparent;
    border:1px solid var(--card-border);
    color:var(--fg-dim);
    padding:9px 20px;
    border-radius:999px;
    font-family:inherit;
    font-size:0.9rem;
    cursor:pointer;
    transition:all .2s ease;
    position:relative;
  }
  nav.tabs button:hover{color:var(--fg); border-color:var(--green);}
  nav.tabs button.active{
    color:var(--bg);
    background:var(--green-bright);
    border-color:var(--green-bright);
    font-weight:600;
  }

  main{
    max-width:900px;
    margin:0 auto;
    padding:0 20px 100px;
  }
  .cat-title{
    display:flex;
    align-items:center;
    gap:12px;
    margin:6px 0 22px;
  }
  .cat-title .stem{flex:1; height:1px; background:linear-gradient(to left, var(--line), transparent);}
  .cat-title span{
    font-size:1.15rem;
    font-weight:700;
    color:var(--green-bright);
    white-space:nowrap;
  }
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(260px,1fr));
    gap:14px;
  }
  .item{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    padding:18px 18px 16px;
    position:relative;
    transition:border-color .2s ease, transform .2s ease;
  }
  .item:hover{border-color:var(--green); transform:translateY(-2px);}
  .item .row{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:10px;
  }
  .item h3{
    margin:0;
    font-size:1.05rem;
    font-weight:600;
    color:var(--fg);
  }
  .item .price{
    color:var(--green-bright);
    font-weight:700;
    font-size:0.95rem;
    white-space:nowrap;
  }
  .item .desc{
    color:var(--fg-dim);
    font-size:0.85rem;
    margin-top:6px;
    font-weight:300;
  }
  .empty-cat{
    color:var(--fg-dim);
    text-align:center;
    padding:40px 0;
    font-size:0.9rem;
  }

  .settings-btn{
    position:fixed;
    bottom:22px;
    left:22px;
    width:46px;height:46px;
    border-radius:50%;
    background:var(--card);
    border:1px solid var(--card-border);
    color:var(--fg-dim);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    z-index:40;
    transition:all .2s ease;
  }
  .settings-btn:hover{color:var(--green-bright); border-color:var(--green);}
  .settings-btn svg{width:22px;height:22px;}

  .overlay{
    position:fixed; inset:0;
    background:rgba(8,10,7,0.72);
    backdrop-filter:blur(2px);
    display:none;
    align-items:center; justify-content:center;
    z-index:100;
    padding:20px;
  }
  .overlay.show{display:flex;}
  .modal{
    background:var(--bg-soft);
    border:1px solid var(--card-border);
    border-radius:6px;
    width:100%;
    max-width:640px;
    max-height:86vh;
    overflow-y:auto;
    padding:28px;
    position:relative;
  }
  .modal h2{
    margin:0 0 4px;
    font-size:1.2rem;
    color:var(--fg);
  }
  .modal .sub{color:var(--fg-dim); font-size:0.85rem; margin-bottom:20px;}
  .modal .close{
    position:absolute; top:18px; left:18px;
    background:none;border:none;color:var(--fg-dim);
    cursor:pointer; font-size:1.3rem; line-height:1;
  }
  .modal .close:hover{color:var(--fg);}

  label{
    display:block;
    font-size:0.8rem;
    color:var(--fg-dim);
    margin-bottom:6px;
    margin-top:14px;
  }
  input[type=text], input[type=password], input[type=number], textarea{
    width:100%;
    background:var(--bg);
    border:1px solid var(--card-border);
    color:var(--fg);
    padding:10px 12px;
    border-radius:var(--radius);
    font-family:inherit;
    font-size:0.9rem;
    outline:none;
  }
  input:focus, textarea:focus{border-color:var(--green);}
  textarea{resize:vertical; min-height:50px;}

  .btn{
    display:inline-flex; align-items:center; justify-content:center;
    gap:6px;
    background:var(--green-bright);
    color:#10140f;
    border:none;
    padding:10px 18px;
    border-radius:var(--radius);
    font-family:inherit;
    font-weight:600;
    font-size:0.85rem;
    cursor:pointer;
    transition:opacity .2s ease;
  }
  .btn:hover{opacity:0.88;}
  .btn.secondary{
    background:transparent;
    border:1px solid var(--card-border);
    color:var(--fg-dim);
  }
  .btn.secondary:hover{color:var(--fg); border-color:var(--green);}
  .btn.danger{
    background:transparent;
    border:1px solid #6b3535;
    color:#c98080;
  }
  .btn.danger:hover{background:#3a1f1f;}
  .btn.small{padding:6px 12px; font-size:0.78rem;}
  .btn.block{width:100%; margin-top:18px;}

  .error-msg{
    color:#e08585;
    font-size:0.82rem;
    margin-top:10px;
    display:none;
  }
  .error-msg.show{display:block;}

  .admin-tabs{
    display:flex; gap:8px; margin-bottom:20px;
    border-bottom:1px solid var(--card-border);
  }
  .admin-tabs button{
    background:none;border:none;color:var(--fg-dim);
    padding:8px 4px; margin-left:18px;
    font-family:inherit; font-size:0.88rem;
    cursor:pointer; border-bottom:2px solid transparent;
  }
  .admin-tabs button.active{color:var(--green-bright); border-color:var(--green-bright); font-weight:600;}

  .admin-cat-block{
    border:1px solid var(--card-border);
    border-radius:var(--radius);
    padding:14px 16px;
    margin-bottom:16px;
    background:var(--card);
  }
  .admin-cat-head{
    display:flex; gap:8px; align-items:center;
  }
  .admin-cat-head input{flex:1;}
  .admin-item-row{
    display:grid;
    grid-template-columns:1.2fr 1.6fr 0.8fr auto;
    gap:8px;
    align-items:center;
    margin-top:10px;
    padding-top:10px;
    border-top:1px dashed var(--card-border);
  }
  .admin-item-row textarea{min-height:38px; padding:8px 10px;}
  .top-row{display:flex; justify-content:space-between; align-items:center; gap:10px; margin-top:22px;}
  .top-row:first-child{margin-top:0;}
  .hint{color:var(--fg-dim); font-size:0.78rem; margin-top:4px;}
  .status-msg{
    color:var(--green-bright); font-size:0.85rem; margin-top:14px; display:none;
  }
  .status-msg.show{display:block;}
  .loading-note{ text-align:center; color:var(--fg-dim); padding:60px 0; font-size:0.9rem;}
</style>
</head>

<script>
const STORAGE_KEY = 'cafe_menu_state_v1';
let state = null;
let authed = false;
let activeCategoryId = null;
let adminTab = 'general';

function esc(str){
  return (str==null?'':String(str)).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function uid(prefix){ return prefix + '_' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function formatPrice(n){
  const num = Number(n)||0;
  return num.toLocaleString('en-US') + ' تومان';
}

function defaultState(){
  return {
    cafeName: 'کافه برگ',
    tagline: 'طعم آرامش، عطر بهار',
    password: 'admin123',
    categories: [
      { id: uid('cat'), name: 'نوشیدنی گرم', items: [
        { id: uid('item'), name: 'اسپرسو', desc: 'قهوه غلیظ ایتالیایی', price: 65000 },
        { id: uid('item'), name: 'کاپوچینو', desc: 'اسپرسو با شیر بخاردیده و کف نرم', price: 85000 },
        { id: uid('item'), name: 'دمنوش بهار نارنج', desc: 'گیاهی، معطر و آرام‌بخش', price: 70000 }
      ]},
      { id: uid('cat'), name: 'نوشیدنی سرد', items: [
        { id: uid('item'), name: 'آیس لاته', desc: 'قهوه سرد با شیر و یخ', price: 95000 },
        { id: uid('item'), name: 'موهیتو', desc: 'نعنا، لیمو و سودا', price: 90000 }
      ]},
      { id: uid('cat'), name: 'دسر', items: [
        { id: uid('item'), name: 'چیزکیک وانیلی', desc: 'با سس توت قرمز', price: 120000 },
        { id: uid('item'), name: 'براونی گردو', desc: 'گرم، سرو با بستنی وانیلی', price: 110000 }
      ]},
      { id: uid('cat'), name: 'قلیون', items: [
        { id: uid('item'), name: 'قلیون دو سیب', desc: 'کلاسیک و خنک', price: 180000 },
        { id: uid('item'), name: 'قلیون نعنا یخی', desc: 'طعم تازه و خنک‌کننده', price: 190000 }
      ]}
    ]
  };
}

async function loadState(){
  try{
    const res = await fetch('/.netlify/functions/menu');
    const data = await res.json();
    if(data){
      state = data;
    } else {
      state = defaultState();
      await saveState();
    }
  }catch(e){
    console.error('Load failed, using local default', e);
    state = defaultState();
  }
  activeCategoryId = state.categories[0] ? state.categories[0].id : null;
  renderAll();
}

async function saveState(){
  try{
    const res = await fetch('/.netlify/functions/menu', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(state)
    });
    return res.ok;
  }catch(e){
    console.error('Storage save failed', e);
    return false;
  }
}

function renderAll(){
  const nameEl = document.getElementById('cafeNameDisplay');
  const tagEl = document.getElementById('taglineDisplay');
  nameEl.textContent = state.cafeName;
  tagEl.textContent = state.tagline;
  nameEl.style.visibility = 'visible';
  tagEl.style.visibility = 'visible';
  document.title = state.cafeName + ' | منو';
  renderTabs();
  renderMenu();
}

function renderTabs(){
  const nav = document.getElementById('tabsNav');
  if(!state.categories.length){ nav.innerHTML=''; return; }
  nav.innerHTML = state.categories.map(c => `
    <button data-cat="${c.id}" class="${c.id===activeCategoryId?'active':''}">${esc(c.name)}</button>
  `).join('');
  nav.querySelectorAll('button').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      activeCategoryId = btn.dataset.cat;
      renderTabs();
      renderMenu();
    });
  });
}

function renderMenu(){
  const main = document.getElementById('mainMenu');
  const cat = state.categories.find(c=>c.id===activeCategoryId);
  if(!cat){ main.innerHTML = '<div class="empty-cat">هنوز دسته‌بندی‌ای اضافه نشده است</div>'; return; }
  const itemsHtml = cat.items.length ? cat.items.map(it => `
    <div class="item">
      <div class="row">
        <h3>${esc(it.name)}</h3>
        <div class="price">${formatPrice(it.price)}</div>
      </div>
      ${it.desc ? `<div class="desc">${esc(it.desc)}</div>` : ''}
    </div>
  `).join('') : '<div class="empty-cat">آیتمی در این دسته وجود ندارد</div>';

  main.innerHTML = `
    <div class="cat-title"><span>${esc(cat.name)}</span><div class="stem"></div></div>
    <div class="grid">${itemsHtml}</div>
  `;
}

const settingsBtn = document.getElementById('settingsBtn');
const loginOverlay = document.getElementById('loginOverlay');
const adminOverlay = document.getElementById('adminOverlay');

settingsBtn.addEventListener('click', ()=>{
  if(authed){ openAdmin(); } else { openLogin(); }
});
function openLogin(){
  document.getElementById('passwordInput').value='';
  document.getElementById('loginError').classList.remove('show');
  loginOverlay.classList.add('show');
  setTimeout(()=>document.getElementById('passwordInput').focus(),50);
}
document.getElementById('closeLogin').addEventListener('click', ()=> loginOverlay.classList.remove('show'));
loginOverlay.addEventListener('click', (e)=>{ if(e.target===loginOverlay) loginOverlay.classList.remove('show'); });

document.getElementById('loginSubmit').addEventListener('click', tryLogin);
document.getElementById('passwordInput').addEventListener('keydown', (e)=>{ if(e.key==='Enter') tryLogin(); });
document.getElementById('togglePassword').addEventListener('click', ()=>{
  const inp = document.getElementById('passwordInput');
  const btn = document.getElementById('togglePassword');
  if(inp.type === 'password'){ inp.type = 'text'; btn.textContent = 'پنهان'; }
  else { inp.type = 'password'; btn.textContent = 'نمایش'; }
});

function tryLogin(){
  const val = document.getElementById('passwordInput').value;
  if(val === state.password){
    authed = true;
    loginOverlay.classList.remove('show');
    openAdmin();
  } else {
    document.getElementById('loginError').classList.add('show');
  }
}

function openAdmin(){
  document.getElementById('cafeNameInput').value = state.cafeName;
  document.getElementById('taglineInput').value = state.tagline;
  document.getElementById('newPasswordInput').value = '';
  setAdminTab('general');
  renderCategoriesEditor();
  adminOverlay.classList.add('show');
}
document.getElementById('closeAdmin').addEventListener('click', ()=> adminOverlay.classList.remove('show'));
adminOverlay.addEventListener('click', (e)=>{ if(e.target===adminOverlay) adminOverlay.classList.remove('show'); });

document.querySelectorAll('.admin-tabs button').forEach(btn=>{
  btn.addEventListener('click', ()=> setAdminTab(btn.dataset.tab));
});
function setAdminTab(tab){
  adminTab = tab;
  document.querySelectorAll('.admin-tabs button').forEach(b=> b.classList.toggle('active', b.dataset.tab===tab));
  document.getElementById('adminGeneral').style.display = tab==='general' ? 'block':'none';
  document.getElementById('adminMenu').style.display = tab==='menu' ? 'block':'none';
}

document.getElementById('logoutBtn').addEventListener('click', ()=>{
  authed = false;
  adminOverlay.classList.remove('show');
});

document.getElementById('saveGeneralBtn').addEventListener('click', async ()=>{
  state.cafeName = document.getElementById('cafeNameInput').value.trim() || state.cafeName;
  state.tagline = document.getElementById('taglineInput').value.trim();
  const newPass = document.getElementById('newPasswordInput').value.trim();
  if(newPass) state.password = newPass;
  const ok = await saveState();
  renderAll();
  const st = document.getElementById('generalStatus');
  st.textContent = ok ? 'ذخیره شد ✓' : 'ذخیره‌سازی ناموفق بود، دوباره تلاش کنید';
  st.classList.add('show');
  setTimeout(()=>st.classList.remove('show'), 2200);
  document.getElementById('newPasswordInput').value='';
});

function renderCategoriesEditor(){
  const wrap = document.getElementById('categoriesEditor');
  wrap.innerHTML = state.categories.map(cat => `
    <div class="admin-cat-block" data-cat-id="${cat.id}">
      <div class="admin-cat-head">
        <input type="text" class="cat-name-input" value="${esc(cat.name)}" data-cat-id="${cat.id}">
        <button class="btn danger small del-cat-btn" data-cat-id="${cat.id}">حذف دسته</button>
      </div>

      ${cat.items.map(it => `
        <div class="admin-item-row" data-item-id="${it.id}" data-cat-id="${cat.id}">
          <input type="text" class="item-name-input" placeholder="نام آیتم" value="${esc(it.name)}">
          <textarea class="item-desc-input" placeholder="توضیح">${esc(it.desc)}</textarea>
          <input type="number" class="item-price-input" placeholder="قیمت (تومان)" value="${it.price}">
          <button class="btn danger small del-item-btn">حذف</button>
        </div>
      `).join('')}

      <button class="btn secondary small add-item-btn" data-cat-id="${cat.id}" style="margin-top:12px;">+ افزودن آیتم</button>
    </div>
  `).join('');

  wrap.querySelectorAll('.del-cat-btn').forEach(b=> b.addEventListener('click', ()=>{
    state.categories = state.categories.filter(c=>c.id !== b.dataset.catId);
    renderCategoriesEditor();
  }));
  wrap.querySelectorAll('.add-item-btn').forEach(b=> b.addEventListener('click', ()=>{
    const cat = state.categories.find(c=>c.id===b.dataset.catId);
    cat.items.push({ id: uid('item'), name:'', desc:'', price:0 });
    renderCategoriesEditor();
  }));
  wrap.querySelectorAll('.del-item-btn').forEach(b=> b.addEventListener('click', ()=>{
    const row = b.closest('.admin-item-row');
    const cat = state.categories.find(c=>c.id===row.dataset.catId);
    cat.items = cat.items.filter(i=>i.id !== row.dataset.itemId);
    renderCategoriesEditor();
  }));
}

document.getElementById('addCategoryBtn').addEventListener('click', ()=>{
  state.categories.push({ id: uid('cat'), name:'دسته‌بندی جدید', items:[] });
  renderCategoriesEditor();
});

document.getElementById('saveMenuBtn').addEventListener('click', async ()=>{
  document.querySelectorAll('.cat-name-input').forEach(inp=>{
    const cat = state.categories.find(c=>c.id===inp.dataset.catId);
    if(cat) cat.name = inp.value.trim() || cat.name;
  });
  document.querySelectorAll('.admin-item-row').forEach(row=>{
    const cat = state.categories.find(c=>c.id===row.dataset.catId);
    const item = cat && cat.items.find(i=>i.id===row.dataset.itemId);
    if(item){
      item.name = row.querySelector('.item-name-input').value.trim();
      item.desc = row.querySelector('.item-desc-input').value.trim();
      item.price = Number(row.querySelector('.item-price-input').value) || 0;
    }
  });
  const ok = await saveState();
  if(!activeCategoryId || !state.categories.find(c=>c.id===activeCategoryId)){
    activeCategoryId = state.categories[0] ? state.categories[0].id : null;
  }
  renderAll();
  renderCategoriesEditor();
  const st = document.getElementById('menuStatus');
  st.textContent = ok ? 'ذخیره شد ✓' : 'ذخیره‌سازی ناموفق بود، دوباره تلاش کنید';
  st.classList.add('show');
  setTimeout(()=>st.classList.remove('show'), 2200);
});

loadState();
</script>
</body>
  </html>
